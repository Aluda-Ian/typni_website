    <!-- Start Membership registration 
    ============================================= -->
    <div class="donation-form default-padding">
        <div class="container">
            <div class="row">
                <div class="col-md-6 form">
                    <h2>Members Login</h2>
                    
                    <div class="panel panel-default">
                        <div class="panel-heading">
                            <h3 class="panel-title">Your Details</h3>
                        </div>
                        <div class="panel-body">
                            <form>
                                <div class="row">
                                    <div class="col-md-12">
                                        <div class="form-group">
                                            <label for="name">Your Name</label>
                                            <div class="input-group">
                                                <input type="text" class="form-control" id="name" placeholder="Name as per ID" required>
                                                <span class="input-group-addon"><i class="fas fa-user"></i></span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-group">
                                            <label for="Phone">Phone Number</label>
                                            <div class="input-group">
                                                <input type="text" class="form-control" id="phone_number" placeholder="+254 " required>
                                                <span class="input-group-addon"><i class="fas fa-phone"></i></span>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-group">
                                            <label for="id-number">ID Number</label>
                                            <div class="input-group">
                                                <input type="text" class="form-control" id="idNumber" placeholder="Your Id Number" required>
                                                <span class="input-group-addon"><i class="fas fa-flag"></i></span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-12">
                                        <div class="form-group">
                                            <label for="email">PassWord </label>
                                            <div class="input-group">
                                                <input type="text" class="form-control" id="email" placeholder="Password" required>
                                                <span class="input-group-addon"><i class="fas fa-envelope"></i></span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-12">
                                        <button class="btn btn-theme effect btn-sm" type="submit">Log In</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
